<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI.TravelAnywhere | Premium Downloader</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* এক কোনায় তোমার নিওন লোগো */
        .top-corner-logo {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #00ffff;
            box-shadow: 0 0 15px #00ffff;
            object-fit: cover;
        }

        /* গ্লোবাল ফিউচারিস্টিক থিম */
        .container {
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        h2 {
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        /* ফাইটার ম্যান ইকবাল ভাইয়ের ক্রেডিট ট্যাগ */
        .creator-tag {
            font-size: 13px;
            color: #888;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        .creator-tag span {
            color: #00ffff;
            font-weight: bold;
        }

        .input-box {
            width: 100%;
            padding: 15px;
            border-radius: 25px;
            border: 2px solid #00ffff;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-size: 16px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            outline: none;
            box-sizing: border-box;
        }

        /* নিওন প্রযুক্তির বাটন */
        .neon-btn {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            color: #000;
            background: #00ffff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 25px #00ffff;
            transition: 0.3s;
        }

        .neon-btn:hover {
            box-shadow: 0 0 40px #00ffff;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <img src="logo.png" class="top-corner-logo" alt="Logo">

    <div class="container">
        <h2>AI.TravelAnywhere</h2>
        <div class="creator-tag">Developed by <span>Iqbal Ahmed</span> | @ia.travelanywhere</div>
        
        <input type="text" class="input-box" placeholder="Paste Video Link Here...">
        <button class="neon-btn">Download Media</button>
        <button class="neon-btn" style="background: transparent; color: #00ffff; border: 2px solid #00ffff; margin-top: 15px; box-shadow: none;">Install App</button>
    </div>

</body>
</html>
