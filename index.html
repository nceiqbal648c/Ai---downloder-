<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI.TravelAnywhere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22AI.TravelAnywhere%22,%22short_name%22:%22TravelAnywhere%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23000000%22,%22theme_color%22:%22%2306b6d4%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/826/826070.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}@">
</head>
<body class="bg-black text-white font-sans min-h-screen flex flex-col justify-between p-6">

    <header class="text-center mt-6">
        <h1 class="text-3xl font-extrabold text-cyan-400 tracking-wider">AI.TRAVELANYWHERE</h1>
        <p class="text-xs text-gray-400 mt-2 uppercase tracking-widest">Official Travel Engine</p>
    </header>

    <main class="w-full max-w-md mx-auto bg-gray-950 p-6 rounded-2xl border border-cyan-900/50 shadow-2xl my-auto">
        <div class="mb-6">
            <label class="block text-left text-sm font-medium text-cyan-400 mb-2">ইউটিউব ভিডিওর লিংক দাও:</label>
            <input type="url" id="videoUrl" placeholder="https://youtube.com/..." 
                   class="w-full bg-gray-900 p-4 rounded-xl border border-gray-800 text-white placeholder-gray-600 focus:outline-none focus:border-cyan-500 transition-all text-sm">
        </div>
        
        <button onclick="startDownload()" 
                class="w-full bg-cyan-500 hover:bg-cyan-600 text-black font-bold p-4 rounded-xl transition-all shadow-lg shadow-cyan-500/20 active:scale-95 text-base">
            🚀 ডাউনলোড টেস্ট শুরু করো
        </button>
    </main>

    <footer class="text-center mb-4">
        <p class="text-[10px] text-gray-600 mt-4">© 2026 AI.TravelAnywhere. All Rights Reserved.</p>
    </footer>

    <script>
        function startDownload() {
            const url = document.getElementById('videoUrl').value.trim();
            if(!url) {
                alert('দয়া করে আগে একটি লিংক পেস্ট করো বন্ধু!');
                return;
            }
            
            // নতুন এবং ক্লিন ডাউনলোড ইঞ্জিন (বিজ্ঞাপন ও রিডাইরেক্ট মুক্ত)
            const cleanUrl = url.split('?')[0];
            const directEngine = "https://y2mate.nu/en142/?url=" + encodeURIComponent(cleanUrl);
            window.open(directEngine, '_blank');
        }
    </script>
</body>
</html>
